<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>WeChat JS-SDK PoC</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>

<style>
body{
    font-family:Arial;
    max-width:900px;
    margin:40px auto;
    padding:20px;
}
h2{
    color:#333;
}
pre{
    background:#f5f5f5;
    padding:10px;
    white-space:pre-wrap;
    word-break:break-all;
}
.ok{
    color:green;
    font-weight:bold;
}
.fail{
    color:red;
    font-weight:bold;
}
button{
    padding:10px 18px;
    cursor:pointer;
}
</style>

</head>

<body>

<h2>WeChat JS-SDK Verification</h2>

<p><b>Current URL</b></p>

<pre id="url"></pre>

<p><b>Status</b></p>

<div id="status">
Initializing...
</div>

<br>

<button onclick="checkApi()">checkJsApi</button>

<h3>Result</h3>

<pre id="result"></pre>

<script>

document.getElementById("url").textContent=location.href.split("#")[0];

wx.config({

debug:true,

appId:"śõŅśćĘAPPID",

timestamp:śõŅśćĘTIMESTAMP,

nonceStr:"śõŅśćĘNONCE",

signature:"śõŅśćĘSIGNATURE",

jsApiList:["checkJsApi"]

});

wx.ready(function(){

document.getElementById("status").innerHTML='<span class="ok">wx.config SUCCESS</span>';

});

wx.error(function(res){

document.getElementById("status").innerHTML='<span class="fail">wx.config FAILED</span>';

document.getElementById("result").textContent=JSON.stringify(res,null,4);

});

function checkApi(){

wx.checkJsApi({

jsApiList:["checkJsApi"],

success:function(res){

document.getElementById("result").textContent=JSON.stringify(res,null,4);

},

fail:function(res){

document.getElementById("result").textContent=JSON.stringify(res,null,4);

}

});

}

</script>

</body>
</html>
